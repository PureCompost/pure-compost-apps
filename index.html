<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pure Compost Apps</title>
<style>
:root{--blue:#1f4e78;--light:#f5f7fa;--text:#1f2933}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--light);color:var(--text);padding:20px}
.wrap{max-width:720px;margin:0 auto}
.header{background:var(--blue);color:white;border-radius:16px;padding:22px;text-align:center;margin-bottom:18px;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.card{background:white;border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.08);border:1px solid #e6e8eb}
a.button{display:block;text-decoration:none;background:var(--blue);color:white;font-weight:bold;text-align:center;padding:16px;border-radius:12px;margin-top:10px}
.note{font-size:14px;color:#667085;line-height:1.45}
</style>
</head>
<body>
<div class="wrap">
  <section class="header">
    <h1>Pure Compost Apps</h1>
    <p>Open the app you need below.</p>
  </section>

  <section class="card">
    <h2>NIR Tracker</h2>
    <p class="note">Moisture tracking app.</p>
    <a class="button" href="./nir-tracker/">Open NIR Tracker</a>
  </section>

  <section class="card">
    <h2>Flow Rate Calculator</h2>
    <p class="note">Flow rate calculator app.</p>
    <a class="button" href="./flow-rate/">Open Flow Rate Calculator</a>
  </section>
</div>
</body>
</html>
